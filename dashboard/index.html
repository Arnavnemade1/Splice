<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splice | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #00ffaa;
            --accent-glow: rgba(0, 255, 170, 0.2);
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1f1f1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        .status-badge {
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        main {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        .timeline {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .snapshot-card {
            border-left: 2px solid var(--border);
            padding: 0 0 20px 20px;
            position: relative;
        }

        .snapshot-card::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 0;
            width: 8px;
            height: 8px;
            background: var(--border);
            border-radius: 50%;
        }

        .snapshot-card.active::before {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .snapshot-card.active {
            border-left-color: var(--accent);
        }

        .snap-type {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .snap-details { font-size: 14px; margin-bottom: 10px; }
        .snap-time { font-size: 11px; color: var(--text-dim); }

        .speculative-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            padding: 15px;
        }

        .fork-node {
            background: #151515;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .fork-node.cached { border-color: var(--accent); }

        .vision-feed {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 15px;
            overflow-y: auto;
        }

        .vision-card {
            background: #151515;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .vision-card img { width: 100%; display: block; filter: grayscale(0.5); transition: 0.3s; }
        .vision-card:hover img { filter: grayscale(0); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>SPLICE</span> CONTROL CENTER</div>
        <div class="status-badge">Ghost Protocol Active</div>
    </header>

    <main>
        <!-- Causal Replay Timeline -->
        <section class="panel">
            <div class="panel-header">Causal Replay <span>Live</span></div>
            <div class="timeline" id="timeline">
                <div class="snapshot-card active">
                    <div class="snap-type">NAVIGATE</div>
                    <div class="snap-details">https://www.bloomberg.com</div>
                    <div class="snap-time">Just now</div>
                </div>
                <div class="snapshot-card">
                    <div class="snap-type">SPECULATIVE_FORK</div>
                    <div class="snap-details">Pre-loading 5 competitive nodes</div>
                    <div class="snap-time">2 mins ago</div>
                </div>
            </div>
        </section>

        <!-- Speculative Map -->
        <section class="panel">
            <div class="panel-header">Speculative Cache Map</div>
            <div class="speculative-grid" id="spec-grid">
                <div class="fork-node cached">
                    <div class="snap-type">READY</div>
                    <div class="snap-details">TSLA.US</div>
                </div>
                <div class="fork-node cached">
                    <div class="snap-type">READY</div>
                    <div class="snap-details">RIVN.US</div>
                </div>
                <div class="fork-node">
                    <div class="snap-type" style="color: var(--text-dim)">IDLE</div>
                    <div class="snap-details">LCID.US</div>
                </div>
            </div>
        </section>

        <!-- Vision Lens Feed -->
        <section class="panel">
            <div class="panel-header">Vision Lens Feed</div>
            <div class="vision-feed" id="vision-feed">
                <div class="vision-card">
                    <div style="height: 150px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #555;">[ CHART_NODE_1223 ]</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // In a real implementation, this would poll the splice://session/dashboard resource
        console.log("Splice Dashboard Initialized.");
    </script>
</body>
</html>
