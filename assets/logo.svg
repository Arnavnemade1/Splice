<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" width="440" height="110" role="img" aria-label="Splice — browser cognition for autonomous agents">
  <title>Splice</title>
  <defs>
    <style>
      .strand {
        fill: none;
        stroke: #6366f1;
        stroke-width: 11;
        stroke-linecap: round;
        stroke-dasharray: 210;
        animation: weave 4s cubic-bezier(0.45, 0, 0.25, 1) infinite;
      }
      .strand-b { opacity: 0.45; animation-direction: reverse; }
      @keyframes weave {
        0%   { stroke-dashoffset: 210; }
        40%  { stroke-dashoffset: 0; }
        85%  { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -210; }
      }
      @media (prefers-reduced-motion: reduce) {
        .strand { animation: none; stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Mark: two strands spliced into one. -->
  <g transform="translate(4, 7) scale(0.8)">
    <path class="strand" d="M 22 30 C 60 30, 60 60, 60 60 C 60 60, 60 90, 98 90"/>
    <path class="strand strand-b" d="M 98 30 C 60 30, 60 60, 60 60 C 60 60, 60 90, 22 90"/>
  </g>

  <!-- Wordmark: mid-tone grays, legible on light and dark backgrounds. -->
  <text x="122" y="66" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="44" font-weight="700" letter-spacing="-1" fill="#6b7280">Splice</text>
  <text x="124" y="90" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="13" font-weight="500" letter-spacing="0.5" fill="#9ca3af">Browser cognition for autonomous agents</text>
</svg>
